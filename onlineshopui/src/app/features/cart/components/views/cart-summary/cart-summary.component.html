<app-card>
    <div class="space-y-4">
        <div class="text-lg font-semibold text-text">Order Summary</div>
        <div class="flex items-center justify-between text-text">
            <span>Items</span>
            <span>{{ itemCount() }}</span>
        </div>
        <div class="flex items-center justify-between text-text">
            <span>Subtotal</span>
            <span class="text-xl font-semibold">${{ subtotal() }}</span>
        </div>

        <div class="pt-4 border-t border-border">
            <div class="text-sm font-medium text-text mb-3">Delivery Address</div>
            <form [formGroup]="addressForm" class="space-y-3">
                <div>
                    <label for="country" class="block text-sm font-medium text-text-muted mb-1">
                        Country
                    </label>
                    <input
                        id="country"
                        type="text"
                        formControlName="country"
                        class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent"
                    />
                    <app-error-message [control]="addressForm.controls['country']" />
                </div>
                <div>
                    <label for="city" class="block text-sm font-medium text-text-muted mb-1">
                        City
                    </label>
                    <input
                        id="city"
                        type="text"
                        formControlName="city"
                        class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent"
                    />
                    <app-error-message [control]="addressForm.controls['city']" />
                </div>
                <div>
                    <label for="county" class="block text-sm font-medium text-text-muted mb-1">
                        County
                    </label>
                    <input
                        id="county"
                        type="text"
                        formControlName="county"
                        class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent"
                    />
                    <app-error-message [control]="addressForm.controls['county']" />
                </div>
                <div>
                    <label for="streetAddress" class="block text-sm font-medium text-text-muted mb-1">
                        Street Address
                    </label>
                    <input
                        id="streetAddress"
                        type="text"
                        formControlName="streetAddress"
                        class="w-full px-3 py-2 border rounded-md bg-surface border-border text-text focus:ring-2 focus:ring-ring focus:border-transparent"
                    />
                    <app-error-message [control]="addressForm.controls['streetAddress']" />
                </div>
            </form>
        </div>

        <div class="pt-4 border-t border-border flex flex-col gap-3">
            <button
                type="button"
                (click)="onCheckout()"
                [disabled]="isSubmitting()"
                class="w-full px-4 py-2 rounded-md bg-primary hover:bg-accent text-primary-foreground font-medium transition-colors disabled:opacity-50"
            >
                Place Order
            </button>
            <button
                type="button"
                (click)="onClear()"
                [disabled]="isSubmitting()"
                class="w-full px-4 py-2 rounded-md border border-border text-text hover:bg-surface-2 transition-colors disabled:opacity-50"
            >
                Clear Cart
            </button>
        </div>
    </div>
</app-card>
