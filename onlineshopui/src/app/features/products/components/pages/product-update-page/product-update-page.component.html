<div class="min-h-screen bg-surface py-8">
    <div class="container mx-auto px-4 max-w-3xl">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-text">Edit Product</h1>
            <p class="mt-2 text-text-muted">Update product information</p>
        </div>

        <!-- Loading State -->
        @if (loading() && !product()) {
            <app-spinner [overlay]="true"></app-spinner>
        }

        <!-- Error State -->
        @if (error() && !loading()) {
            <div
                class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded-lg p-6 text-center"
            >
                <p class="text-red-800 dark:text-red-200 mb-4">{{ error() }}</p>
                <button
                    (click)="retry()"
                    class="px-4 py-2 bg-red-600 hover:bg-red-700 dark:bg-red-500 dark:hover:bg-red-600 text-white rounded-md transition-colors"
                >
                    Try Again
                </button>
            </div>
        }

        <!-- Supplier load error banner (non-blocking) -->
        @if (supplierError() && !loading()) {
            <div class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg p-4 mb-4 flex items-center justify-between">
                <p class="text-yellow-800 dark:text-yellow-200 text-sm">Could not load suppliers. Supplier selection may be unavailable.</p>
                <button
                    (click)="retrySuppliers()"
                    class="ml-4 px-3 py-1 text-sm bg-yellow-600 hover:bg-yellow-700 text-white rounded-md transition-colors"
                >
                    Retry
                </button>
            </div>
        }

        <!-- Form -->
        @if (product() && categories().length > 0) {
            <app-card>
                <app-product-form
                    [form]="form"
                    [categories]="categories()"
                    [suppliers]="suppliers()"
                    [isSubmitting]="isSubmitting()"
                    [submitLabel]="'Update Product'"
                    (formSubmit)="onSubmit()"
                    (cancelled)="onCancel()"
                />
            </app-card>
        }
    </div>
</div>
